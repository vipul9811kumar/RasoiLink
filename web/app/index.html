<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Download RasoiLink</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #fff8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: #fff;
      border-radius: 20px;
      padding: 40px 32px;
      max-width: 380px;
      width: 100%;
      text-align: center;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }
    .logo { font-size: 56px; margin-bottom: 12px; }
    h1 { font-size: 24px; color: #1a1a1a; margin-bottom: 8px; }
    p  { font-size: 15px; color: #666; margin-bottom: 28px; line-height: 1.5; }
    .btn {
      display: inline-block;
      background: #FF6B00;
      color: #fff;
      font-size: 16px;
      font-weight: 700;
      padding: 16px 32px;
      border-radius: 12px;
      text-decoration: none;
      width: 100%;
    }
    .note {
      margin-top: 20px;
      font-size: 12px;
      color: #999;
      line-height: 1.6;
    }
    .spinner {
      display: none;
      margin: 16px auto 0;
      width: 28px; height: 28px;
      border: 3px solid #eee;
      border-top-color: #FF6B00;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
  <script>
    const APK = 'https://github.com/vipul9811kumar/RasoiLink/releases/download/v1.0.0-beta/rasoilink-latest.apk';
    function download() {
      window.location.href = APK;
      document.getElementById('spinner').style.display = 'block';
      document.getElementById('status').textContent = 'Your download is starting…';
    }
  </script>
</head>
<body>
  <div class="card">
    <div class="logo">🍳</div>
    <h1>RasoiLink</h1>
    <p id="status">Fair Work. Fair Pay. Real Trust.<br/>Download the app to get started.</p>
    <a class="btn" href="#" onclick="download(); return false;">
      ⬇️ Download for Android
    </a>
    <div class="spinner" id="spinner"></div>
    <p class="note">
      Android only · After downloading, tap the file to install.<br/>
      If prompted, allow "Install from unknown sources" in Settings.
    </p>
  </div>
</body>
</html>
